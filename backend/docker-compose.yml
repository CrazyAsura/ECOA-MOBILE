version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecoa_postgres
    restart: always
    environment:
      POSTGRES_USER: ecoa_user
      POSTGRES_PASSWORD: ecoa_password
      POSTGRES_DB: ecoa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ecoa_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: ecoa_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://ecoa_user:ecoa_password@postgres:5432/ecoa_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
