services:
  # Backend NestJS
  - type: web
    name: ecoa-api
    env: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ecoa-db
          property: connectionString

databases:
  - name: ecoa-db
    plan: free
    region: ohio
    databaseName: ecoa
    user: ecoa_user
